<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Robot Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav id="topBar">
    <!-- Status pills are generated from the active board manifest at boot. -->
    <div class="topbar-status" id="statusPills"></div>
    <div class="topbar-tabs" id="tabSwitcher"></div>
    <div class="topbar-actions">
      <button id="pauseBtn" class="topbar-btn" title="Pause / Resume (space)">⏸ Pause</button>
      <button id="resetZoomBtn" class="topbar-btn" title="Reset zoom (double-click any chart)">⤢ Reset</button>
      <button id="connectBtn">Connect</button>
    </div>
  </nav>

  <div id="telemetryPanel">
    <div id="chartGrid"></div>
  </div>

  <nav id="bottomBar">
    <div class="bottombar-pills">
      <div class="status-pill console-pill" id="consolePill">
        <span>Serial Console</span>
      </div>
    </div>
  </nav>

  <div id="consoleDialog" class="console-dialog hidden">
    <div class="console-dialog-header">
      <h2>Serial Console</h2>
      <div class="console-dialog-actions">
        <button id="clearBtn">Clear</button>
        <button class="close-btn" id="consoleCloseBtn">&times;</button>
      </div>
    </div>
    <pre id="console"></pre>
  </div>

  <!-- Core (registries + databus) -->
  <script src="databus.js"></script>
  <script src="viewport.js"></script>

  <!-- Source implementations -->
  <script src="sources/web-serial.js"></script>

  <!-- View classes (each registers itself with the view registry) -->
  <script src="views/plot.js"></script>
  <script src="views/pid-controls.js"></script>

  <!-- Board manifests + blueprints (each registers itself).
       Add new boards by appending their manifest + blueprint scripts here. -->
  <script src="boards/pico/manifest.js"></script>
  <script src="boards/pico/blueprints/telemetry.js"></script>
  <script src="boards/pico/blueprints/pid-tuning.js"></script>

  <!-- Top-level wiring -->
  <script src="app.js"></script>
</body>
</html>
