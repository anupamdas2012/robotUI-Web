<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pico 2 Motor Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav id="topBar">
    <div class="topbar-status">
      <div class="status-pill">
        <span class="dot dot-gray" id="dotMotors"></span>
        <span>Motors</span>
      </div>
      <div class="status-pill">
        <span class="dot dot-gray" id="dotIMU"></span>
        <span>IMU</span>
      </div>
      <div class="status-pill">
        <span class="dot dot-gray" id="dotToF"></span>
        <span>ToF</span>
      </div>
    </div>
    <button id="connectBtn">Connect</button>
  </nav>

  <div id="chartGrid">
    <div class="chart-card">
      <div class="chart-header">
        <h2>Motor RPM</h2>
        <div class="current-values">
          <span class="val-cyan" id="valRpmL">L: --</span>
          <span class="val-pink" id="valRpmR">R: --</span>
        </div>
      </div>
      <canvas id="chartRPM"></canvas>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <h2>ToF Distance</h2>
        <div class="current-values">
          <span class="val-green" id="valToF">-- mm</span>
        </div>
      </div>
      <canvas id="chartToF"></canvas>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <h2>IMU Orientation</h2>
        <div class="current-values">
          <span class="val-amber" id="valHeading">H: --</span>
          <span class="val-cyan" id="valPitch">P: --</span>
          <span class="val-pink" id="valRoll">R: --</span>
        </div>
      </div>
      <canvas id="chartIMU"></canvas>
    </div>

    <div class="chart-card">
      <div class="chart-header">
        <h2>Loop Timing</h2>
        <div class="current-values">
          <span class="val-purple" id="valLoopAvg">Avg: --</span>
          <span class="val-red" id="valLoopMax">Max: --</span>
        </div>
      </div>
      <canvas id="chartLoop"></canvas>
    </div>
  </div>

  <div id="consoleSection">
    <div class="console-header">
      <h2>Serial Console</h2>
      <button id="clearBtn">Clear</button>
    </div>
    <pre id="console"></pre>
  </div>

  <script src="app.js"></script>
</body>
</html>
