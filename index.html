<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pico 2 Dashboard</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1"></script>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <nav id="topBar">
    <div class="topbar-status">
      <div class="status-pill">
        <span class="dot dot-gray" id="dotMotors"></span>
        <span>Motors</span>
      </div>
      <div class="status-pill">
        <span class="dot dot-gray" id="dotIMU"></span>
        <span>IMU</span>
      </div>
      <div class="status-pill">
        <span class="dot dot-gray" id="dotToF"></span>
        <span>ToF</span>
      </div>
    </div>
    <div class="topbar-tabs" id="tabSwitcher"></div>
    <div class="topbar-actions">
      <button id="pauseBtn" class="topbar-btn" title="Pause / Resume (space)">⏸ Pause</button>
      <button id="resetZoomBtn" class="topbar-btn" title="Reset zoom (double-click any chart)">⤢ Reset</button>
      <button id="connectBtn">Connect</button>
    </div>
  </nav>

  <div id="telemetryPanel">
    <div id="chartGrid"></div>
  </div>

  <nav id="bottomBar">
    <div class="bottombar-pills">
      <div class="status-pill console-pill" id="consolePill">
        <span>Serial Console</span>
      </div>
    </div>
  </nav>

  <div id="consoleDialog" class="console-dialog hidden">
    <div class="console-dialog-header">
      <h2>Serial Console</h2>
      <div class="console-dialog-actions">
        <button id="clearBtn">Clear</button>
        <button class="close-btn" id="consoleCloseBtn">&times;</button>
      </div>
    </div>
    <pre id="console"></pre>
  </div>

  <!-- Core (must load before views/blueprints/app) -->
  <script src="connection.js"></script>
  <script src="databus.js"></script>
  <script src="viewport.js"></script>

  <!-- View classes (each registers itself with the viewport's view registry) -->
  <script src="views/plot.js"></script>
  <script src="views/pid-controls.js"></script>

  <!-- Blueprints (depend on view types existing in the registry) -->
  <script src="blueprints/telemetry.js"></script>
  <script src="blueprints/pid-tuning.js"></script>

  <!-- Top-level wiring (uses everything above) -->
  <script src="app.js"></script>
</body>
</html>
